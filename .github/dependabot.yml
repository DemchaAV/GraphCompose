# Dependabot configuration for GraphCompose.
# Docs: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  - package-ecosystem: maven
    directories:
      - "/"
      - "/examples"
      - "/benchmarks"
    # Send Maven update PRs to the integration branch, not the
    # default branch. Releases are cut from `develop` then merged
    # to `main`; targeting `main` (the default) made every Dependabot
    # PR land alongside the latest release and force-diverge from
    # ongoing dev work — fixed in v1.6.8 after the #111 / #115 episodes.
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - maven
    commit-message:
      prefix: deps
      include: scope
    groups:
      maven-minor-patch:
        patterns: ["*"]
        update-types: ["minor", "patch"]
    ignore:
      # jackson-bom 2.22.0 ships ahead of its module jars: jackson-core-2.22.0.jar
      # returns 404 on repo1.maven.org (Sonatype partial-sync window). Block this
      # exact release so the grouped PR is buildable. Drop this entry once
      # jackson-bom >= 2.22.1 (or 2.23.0) lands on Central with full module sync.
      - dependency-name: "com.fasterxml.jackson:jackson-bom"
        versions: ["2.22.0"]

  - package-ecosystem: github-actions
    directory: "/"
    # Same reasoning as the maven block above — workflow updates
    # ride the integration branch.
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
    groups:
      github-actions:
        patterns: ["*"]
